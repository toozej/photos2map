---
name: Rollback Major Version
run-name: >-
  Move ${{ github.event.inputs.major_version }} to ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: The tag or reference to roll back to (e.g. v1.3.0)
        required: true
      major_version:
        description: The major version tag to move (e.g. v1)
        required: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate inputs
        env:
          MAJOR_VERSION: ${{ github.event.inputs.major_version }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          if [[ ! "$MAJOR_VERSION" =~ ^v[0-9]+$ ]]; then
            echo "major_version must be in the form vN (e.g. v1)"
            exit 1
          fi
          if [[ ! "$TARGET" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "target must be a valid semver tag (e.g. v1.3.0)"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify target tag exists
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          if ! git rev-parse "$TARGET" >/dev/null 2>&1; then
            echo "Target tag '$TARGET' does not exist."
            exit 1
          fi
      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Tag new target
        env:
          MAJOR_VERSION: ${{ github.event.inputs.major_version }}
          TARGET: ${{ github.event.inputs.target }}
        run: git tag -f "$MAJOR_VERSION" "$TARGET"
      - name: Push new tag
        env:
          MAJOR_VERSION: ${{ github.event.inputs.major_version }}
        run: git push origin "$MAJOR_VERSION" --force
