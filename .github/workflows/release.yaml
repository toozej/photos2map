---
name: Release

on:
  push:
    tags:
      - "v[0-9]*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  # Give the workflow permission to write attestations.
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    if: contains(github.ref_name, '.')
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag. Skipping release."
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --force --tags
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          check-latest: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - uses: anchore/sbom-action/download-syft@v0 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Login to DockerHub
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        # https://docs.docker.com/docker-hub/access-tokens/
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        # https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_GHCR_TOKEN }}
      - name: Login to Quay Container Registry
        uses: docker/login-action@v4 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        # https://github.com/marketplace/actions/push-to-registry#examples
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: '/home/runner/work/photos2map/photos2map'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      # After GoReleaser runs, attest all the files in ./dist/checksums.txt:
      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/checksums.txt
      # After GoReleaser runs, attest all the images in ./dist/digests.txt:
      - uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/digests.txt
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: ./dist/

  verify_signed_checksums:
    name: verify-signed-checksums
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Download dist artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: ./dist
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Verify signature of checksums bundle
        run: |
          cosign verify-blob \
            --certificate-identity-regexp '^https://github.com/toozej/photos2map/\.github/workflows/release\.yaml@refs/tags/.*$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            --bundle ./dist/checksums.txt.sigstore.json \
            ./dist/checksums.txt

  trivy-scan-image:
    name: trivy-scan-image
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
        with:
          image-ref: 'ghcr.io/toozej/photos2map:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  verify_signed_docker_images:
    runs-on: ubuntu-latest
    needs: [goreleaser, trivy-scan-image]
    permissions: {}
    strategy:
      matrix:
        registry: ['', 'ghcr.io/', 'quay.io/']
        tag: ['latest', 'distroless']
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2 # nosemgrep: yaml.github-actions.security.third-party-action-not-pinned-to-commit-sha.third-party-action-not-pinned-to-commit-sha
      - name: Verify signatures of Docker images
        run: |
          cosign version
          cosign verify \
            --certificate-identity-regexp '^https://github.com/toozej/photos2map/\.github/workflows/(release|weekly-docker-refresh)\.yaml@refs/(tags/.*|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            ${{ matrix.registry }}toozej/photos2map:${{ matrix.tag }}
